# Econumo self-hosted stack.
#
#   End users (published image):  docker compose pull && docker compose up -d
#   Developers (build from src):  docker compose up -d --build   (or `make up`)
#
# Config lives in .env (copy .env.example). Two named volumes hold everything
# mutable — `db` for the sqlite database (/app/var/db) and `jwt` for the
# auto-generated JWT keypair + passphrase (/app/var/jwt) — so data and logins
# survive recreation.
services:
  econumo:
    image: ghcr.io/econumo/econumo:latest
    # `build` is only used with `--build`; a plain `up` uses the image above.
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile
      target: prod
    env_file:
      - .env
    ports:
      - "8181:80"
    volumes:
      - db:/app/var/db
      - jwt:/app/var/jwt
      # Override the SPA runtime config by mounting your own file:
      #- ./econumo-config.js:/app/spa/econumo-config.js:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/econumo", "healthcheck"]
      interval: 1m30s
      timeout: 10s
      retries: 12
      start_period: 30s

volumes:
  db:
  jwt:
