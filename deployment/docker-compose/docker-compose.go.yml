# Local compose stack that BUILDS the Go backend image from source (the published
# image is ghcr.io/econumo/econumo). Handy for testing a local build:
#
#   docker compose -f docker-compose.go.yml up --build
#
# Notes:
#   - The JWT keypair is generated automatically on first boot into /var/www/var/jwt
#     (persisted by the jwt-go volume below); no keys need to be provided.
#   - DATABASE_URL defaults (in the image) to the SQLite file on the db volume.
#   - econumo-config.js ships with a working default; mount your own over
#     /app/web/spa/econumo-config.js to override (example commented below).
services:
  econumo-go:
    build:
      # Build context is the repo root (two levels up).
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: prod
    image: econumo/econumo-go:latest
    env_file:
      - .env
    environment:
      # The Go binary derives the engine from the URL scheme; this points at the
      # SQLite file on the db volume below.
      DATABASE_URL: sqlite:///var/www/var/db/db.sqlite
    ports:
      - "8182:80"
    volumes:
      - db-go:/var/www/var/db
      - jwt-go:/var/www/var/jwt
      # Override the SPA runtime config by mounting your own file:
      #- ./econumo-config.js:/app/web/spa/econumo-config.js:ro
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "/econumo", "healthcheck"]
      interval: 1m30s
      timeout: 10s
      retries: 12
      start_period: 30s

volumes:
  db-go:
  jwt-go:
