services:
  econumo:
    image: ghcr.io/econumo/econumo:latest
    env_file:
      - .env
    ports:
      - "8181:80"
    volumes:
      - db:/var/www/var/db
      # JWT keypair (auto-generated on first boot). Persist it so logins survive
      # container recreation. Mount your own keys here instead if you prefer.
      - jwt:/var/www/var/jwt
    restart: unless-stopped

    # Example of the healthcheck
#    healthcheck:
#      test: ["CMD", "curl", "-f", "http://localhost/_/health-check"]
#      interval: 1m30s
#      timeout: 10s
#      retries: 12
#      start_period: 60s
#      start_interval: 5s

volumes:
  db:
  jwt: