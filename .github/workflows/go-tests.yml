name: Go tests

# Guards the Go backend (go/) on every push + PR with two tiers:
#   - smoke:      unit + sqlite + lint + coverage gate (fast, no dependencies)
#   - regression: the sqlite-vs-PostgreSQL engine comparison against a real
#                 Postgres service container
on:
  push:
    paths:
      - 'go/**'
      - '.github/workflows/go-tests.yml'
  pull_request:
    paths:
      - 'go/**'
      - '.github/workflows/go-tests.yml'

permissions:
  contents: read

jobs:
  # SMOKE: build, vet, gofmt, and the fast sqlite-only suite with a coverage gate.
  # CGO stays off (both DB drivers are pure Go), matching production builds.
  smoke:
    name: Smoke (unit + sqlite)
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - name: Smoke suite (lint + sqlite tests + coverage gate)
        run: make go-test
      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: go/coverage.out
          if-no-files-found: ignore

  # REGRESSION: the sqlite-vs-PostgreSQL engine comparison against a real
  # Postgres. Runs after smoke passes (smoke is the cheaper gate).
  regression:
    name: Regression (sqlite vs PostgreSQL)
    runs-on: ubuntu-latest
    needs: smoke
    env:
      CGO_ENABLED: '0'
      DATABASE_TEST_PGSQL_URL: postgres://econumo:econumo@localhost:5432/econumo_test?sslmode=disable
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: econumo
          POSTGRES_PASSWORD: econumo
          POSTGRES_DB: econumo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U econumo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      # The Postgres service container already provisions econumo_test, so call
      # the engine suite directly (skip go-pg-ensure, which expects compose).
      - name: Engine-comparison suite
        run: make go-test-engines
