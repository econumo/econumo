name: Publish Release

# Publishes the Go backend image to ghcr.io/econumo/econumo ONLY.
# - Always pushes the version tag (e.g. v1.2.3).
# - Also pushes/moves "latest" only when push_latest is checked AND the workflow
#   is dispatched from the main branch.
# - Also pushes/moves "dev" when push_dev is checked (any branch). Unlike
#   `make publish-dev`, the UI version label is the release version, not "dev".

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g., v1.2.3)"
        required: true
      push_latest:
        description: "Publish Latest"
        required: false
        type: boolean
        default: false
      push_dev:
        description: "Publish Dev"
        required: false
        type: boolean
        default: false

concurrency:
  group: "docker-publish-release"
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/econumo/econumo

jobs:
  create-tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write # pushes the release tag
    outputs:
      version: ${{ steps.set.outputs.version }}
      tags: ${{ steps.set.outputs.tags }}
    steps:
      - name: Guard "latest" to the main branch
        if: ${{ github.event.inputs.push_latest == 'true' && github.ref_name != 'main' }}
        run: |
          echo "::error::'latest' can only be published from the main branch (dispatched from '${{ github.ref_name }}')."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute image tags
        id: set
        env:
          VERSION: ${{ github.event.inputs.version }}
          PUSH_LATEST: ${{ github.event.inputs.push_latest }}
          PUSH_DEV: ${{ github.event.inputs.push_dev }}
        run: |
          # The version is a dispatch input: reject anything that is not a plain
          # vX.Y.Z tag before it reaches git or a docker tag.
          if ! printf '%s' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version '$VERSION' (expected vX.Y.Z)"
            exit 1
          fi
          TAGS="${IMAGE}:${VERSION}"
          if [ "$PUSH_LATEST" = "true" ]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          if [ "$PUSH_DEV" = "true" ]; then
            TAGS="${TAGS},${IMAGE}:dev"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${VERSION} -> [${TAGS}]"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        env:
          TAG: ${{ steps.set.outputs.version }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  publish:
    name: Build and Publish Go Image
    needs: create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout tagged ref
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-tag.outputs.version }}

      # No QEMU: both build stages run on $BUILDPLATFORM (Go cross-compiles,
      # the SPA is platform-independent) and the distroless stage only COPYs.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deployment/docker/Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.create-tag.outputs.tags }}
          build-args: |
            ECONUMO_VERSION=${{ needs.create-tag.outputs.version }}

  create-github-release:
    name: Create GitHub Release
    needs: [create-tag, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout tagged ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.create-tag.outputs.version }}

      - name: Set node
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org/
          node-version: lts/*

      - name: Generate release notes and create release
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
