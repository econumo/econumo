on:
  workflow_call:
    inputs:
      IMAGES:
        required: true
        type: string
        description: 'Comma-separated fully-qualified image base refs incl. registry (e.g., "docker.io/econumo/econumo-ce,ghcr.io/econumo/econumo"). The first entry is used as the build cache source.'
      IMAGE_TAGS:
        required: true
        type: string
        description: 'Comma-separated list of tags (e.g., "latest,1.0.0,1.0")'
      ECONUMO_EDITION:
        required: false
        type: string
        default: "ce"
        description: "Econumo edition (ce or cloud)"
      RUNS_ON:
        required: false
        type: string
        default: "ubuntu-latest"
        description: "Runner to use for the build"
      PLATFORMS:
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
        description: "Comma-separated list of platforms to build for"
      VERSION:
        required: false
        type: string
        default: ""
        description: "Version label to inject into the build (e.g., v1.2.3 or beta)"
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      BUILD_USER_TOKEN:
        required: false

jobs:
  build-package:
    runs-on: ${{ inputs.RUNS_ON }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Clone EconumoCloudBundle repository
        if: inputs.ECONUMO_EDITION == 'cloud'
        uses: actions/checkout@v4
        with:
          repository: econumo/econumo-cloud-bundle
          ref: main
          token: ${{ secrets.BUILD_USER_TOKEN }}
          path: src/EconumoCloudBundle

      - name: Set Frontend Environment
        run: |
          rm -f web/.env
          cp "web/.env.${{ inputs.ECONUMO_EDITION }}" web/.env

      - name: Inject Version Label
        run: |
          sed -i 's/__VERSION__/${{ inputs.VERSION }}/' web/.env

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      - name: Log in to Docker Hub
        if: contains(inputs.IMAGES, 'docker.io/')
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        if: contains(inputs.IMAGES, 'ghcr.io/')
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.BUILD_USER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Prepare Docker Image Tags
        id: prep
        run: |
          IFS=',' read -ra IMAGE_ARRAY <<< "${{ inputs.IMAGES }}"
          IFS=',' read -ra TAG_ARRAY <<< "${{ inputs.IMAGE_TAGS }}"
          TAGS=""
          for image in "${IMAGE_ARRAY[@]}"; do
            for tag in "${TAG_ARRAY[@]}"; do
              ref="${image}:${tag}"
              if [ -n "$TAGS" ]; then
                TAGS="${TAGS},"
              fi
              TAGS="${TAGS}${ref}"
            done
          done
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "cache_ref=${IMAGE_ARRAY[0]}:beta" >> $GITHUB_OUTPUT

      - name: Build and Push Multi-Arch Docker Image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          pull: true
          file: deployment/docker/app/Dockerfile
          target: prod
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=registry,ref=${{ steps.prep.outputs.cache_ref }}
          cache-to: type=inline
          platforms: ${{ inputs.PLATFORMS }}
