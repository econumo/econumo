info:
  contact: {}
  description: Self-hosted personal finance and budgeting API (Go port).
  title: Econumo API
  version: 1.0.0
paths:
  /api/v1/account/create-account:
    post:
      consumes:
      - application/json
      description: Creates an account (idempotent on the request id), optionally seeding
        its balance, in the given folder.
      parameters:
      - description: Create account request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/account.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/apidoc.JsonResponseOk'
            - properties:
                data:
                  $ref: '#/definitions/account.CreateAccountResult'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apidoc.JsonResponseError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apidoc.JsonResponseUnauthorized'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apidoc.JsonResponseException'
      security:
      - Bearer: []
      summary: Create an account
      tags:
      - Account
  /api/v1/account/create-folder:
